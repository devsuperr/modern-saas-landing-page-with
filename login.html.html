<!-- route: /login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Red Orange Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style> body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; } </style>
    <script>
let SUPABASE_URL='', SUPABASE_KEY='', sb=null;
window.parent.postMessage({type:'request-auth-config'},'*');
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='auth-config'){
    SUPABASE_URL=e.data.url; SUPABASE_KEY=e.data.anonKey;
    if(window.supabase&&SUPABASE_URL){sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);window.dispatchEvent(new Event('sb-ready'));}
  }
});
const AppState={_data:{},_listeners:{},get(k){return this._data[k]},set(k,v){this._data[k]=v;try{localStorage.setItem('app_'+k,JSON.stringify(v))}catch(e){}(this._listeners[k]||[]).forEach(fn=>fn(v))},load(k,f){try{const v=localStorage.getItem('app_'+k);return v?JSON.parse(v):f}catch(e){return f}},on(k,fn){(this._listeners[k]=this._listeners[k]||[]).push(fn)}};
const Cart={items:AppState.load('cart',[]),add(p,q=1){const e=this.items.find(i=>i.id===p.id);if(e)e.quantity+=q;else this.items.push({...p,quantity:q});this.save()},remove(id){this.items=this.items.filter(i=>i.id!==id);this.save()},updateQty(id,q){const i=this.items.find(x=>x.id===id);if(i)i.quantity=Math.max(0,q);this.items=this.items.filter(i=>i.quantity>0);this.save()},total(){return this.items.reduce((s,i)=>s+i.price*i.quantity,0)},count(){return this.items.reduce((s,i)=>s+i.quantity,0)},save(){AppState.set('cart',this.items);this.render()},render(){document.querySelectorAll('[data-cart-count]').forEach(el=>el.textContent=this.count())}};
const Auth={user:null,async signUp(e,p,n){if(!sb)return{error:'Backend not connected'};const{data,error}=await sb.auth.signUp({email:e,password:p,options:{data:{display_name:n}}});if(!error&&data.user){this.user=data.user;window.dispatchEvent(new Event('auth-change'))}return{data,error}},async signIn(e,p){if(!sb)return{error:'Backend not connected'};const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});if(!error&&data.user){this.user=data.user;window.dispatchEvent(new Event('auth-change'))}return{data,error}},async signOut(){if(sb)await sb.auth.signOut();this.user=null;window.dispatchEvent(new Event('auth-change'))},async getUser(){if(!sb)return null;const{data}=await sb.auth.getUser();this.user=data?.user||null;return this.user}};
async function fetchData(t,m){if(sb){try{const{data,error}=await sb.from(t).select('*');if(!error&&data&&data.length>0)return data}catch(e){}}return m||[]}
function navigateTo(p){window.parent.postMessage({type:'nav-page',pageId:p},'*')}
function showToast(m,t){const d=document.createElement('div');d.className='fixed bottom-4 right-4 z-[9999] px-4 py-3 rounded-xl shadow-lg text-sm font-medium '+(t==='error'?'bg-red-500 text-white':'bg-green-500 text-white');d.textContent=m;document.body.appendChild(d);setTimeout(()=>{d.style.transition='opacity 0.3s ease-in-out';d.style.opacity='0';setTimeout(()=>d.remove(),300)},3000)}
</script>
</head>
<body class="bg-gray-900">
    <div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <a href="#" onclick="navigateTo('/')" class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-orange-400">
                Red Orange Technologies
            </a>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
                Sign in to your account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-400">
                Or{' '}
                <a href="#" onclick="navigateTo('/signup.html')" class="font-medium text-orange-400 hover:text-orange-300">
                    start your 14-day free trial
                </a>
            </p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-gray-800/50 py-8 px-4 shadow-lg sm:rounded-2xl sm:px-10 border border-gray-700">
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300">
                            Email address
                        </label>
                        <div class="mt-1">
                            <input
                                id="email"
                                name="email"
                                type="email"
                                autocomplete="email"
                                required
                                class="appearance-none block w-full px-3 py-2 border border-gray-600 rounded-md shadow-sm placeholder-gray-500 text-white bg-gray-700 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm"
                            />
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300">
                            Password
                        </label>
                        <div class="mt-1">
                            <input
                                id="password"
                                name="password"
                                type="password"
                                autocomplete="current-password"
                                required
                                class="appearance-none block w-full px-3 py-2 border border-gray-600 rounded-md shadow-sm placeholder-gray-500 text-white bg-gray-700 focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm"
                            />
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-500 rounded bg-gray-700"/>
                            <label for="remember-me" class="ml-2 block text-sm text-gray-300">
                                Remember me
                            </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-orange-400 hover:text-orange-300">
                                Forgot your password?
                            </a>
                        </div>
                    </div>

                    <div>
                        <button
                            type="submit"
                            id="submit-button"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 focus:ring-offset-gray-800"
                        >
                           <span class="btn-text">Sign in</span>
                           <svg class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                           </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const submitButton = document.getElementById('submit-button');
            const buttonText = submitButton.querySelector('.btn-text');
            const buttonSpinner = submitButton.querySelector('svg');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                buttonText.classList.add('hidden');
                buttonSpinner.classList.remove('hidden');
                submitButton.disabled = true;

                const email = loginForm.email.value;
                const password = loginForm.password.value;

                const { data, error } = await Auth.signIn(email, password);

                buttonText.classList.remove('hidden');
                buttonSpinner.classList.add('hidden');
                submitButton.disabled = false;

                if (error) {
                    showToast(error.message, 'error');
                } else {
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        // Redirect to a dashboard page in a real app
                        navigateTo('/');
                    }, 1500);
                }
            });
        });
    </script>
</body>
</html>
